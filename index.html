<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humble Design | Official 50/50 Raffle</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #38bdf8;
            --money: #4ade80;
            --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background: linear-gradient(45deg, #020617, #0f172a, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 3rem;
            border-radius: 40px;
            text-align: center;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            z-index: 10;
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7);
            animation: pulse-blue 2s infinite;
        }

        @keyframes pulse-blue {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(56, 189, 248, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }

        h1 { font-size: 1.2rem; font-weight: 400; opacity: 0.7; text-transform: uppercase; letter-spacing: 4px; }
        
        #timer {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 800;
            margin: 1.5rem 0;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 2rem; }

        .stat-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 24px;
            transition: all 0.3s ease;
        }

        .stat-card:hover { background: rgba(255,255,255,0.05); transform: translateY(-5px); }

        .stat-label { font-size: 0.7rem; opacity: 0.5; margin-bottom: 0.5rem; font-weight: 700; text-transform: uppercase; }
        .stat-value { font-size: 1.8rem; font-weight: 800; color: white; }
        .stat-value.green { color: var(--money); text-shadow: 0 0 20px rgba(74, 222, 128, 0.2); }

        .email-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 2.5rem;
            padding: 16px;
            background: white;
            color: black;
            text-decoration: none;
            border-radius: 18px;
            font-weight: 800;
            transition: all 0.3s;
        }

        .email-btn:hover { background: var(--accent); color: white; transform: scale(1.02); }

    </style>
</head>
<body>

    <div class="container">
        <div class="live-indicator">
            <div class="pulse" id="dot"></div>
            <span id="status-label">SYSTEM READY</span>
        </div>

        <h1>Humble Design Fundraiser</h1>
        <div id="timer">00:00:00:00</div>

        <div class="grid">
            <div class="stat-card">
                <div class="stat-label">Total Goal Pot</div>
                <div class="stat-value" id="total-val">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Student Win (50%)</div>
                <div class="stat-value green" id="win-val">$0</div>
            </div>
        </div>

        <a href="mailto:robertzamary@aurora-schools.org?subject=Raffle Question" class="email-btn">
            📩 CONTACT ORGANIZER
        </a>
    </div>

    <script>
        // --- CONFIGURATION ---
        const currentMoney = 5000; // THE ONLY NUMBER YOU NEED TO CHANGE
        const targetDate = new Date("March 16, 2026 00:00:00").getTime();
        const endDate = new Date("March 20, 2026 23:59:59").getTime();

        function update() {
            const now = new Date().getTime();
            let distance;
            let label;

            if (now < targetDate) {
                distance = targetDate - now;
                label = "COUNTDOWN TO START";
                document.getElementById('dot').style.background = "#38bdf8";
            } else if (now < endDate) {
                distance = endDate - now;
                label = "LIVE: RAFFLE CLOSING";
                document.getElementById('dot').style.background = "#ef4444";
            } else {
                document.getElementById('status-label').innerText = "EVENT CLOSED";
                document.getElementById('timer').innerText = "00:00:00";
                return;
            }

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            const pad = (n) => n.toString().padStart(2, '0');

            document.getElementById('status-label').innerText = label;
            document.getElementById('timer').innerText = `${d}:${pad(h)}:${pad(m)}:${pad(s)}`;
            
            // MATH ENGINE
            document.getElementById('total-val').innerText = `$${currentMoney.toLocaleString()}`;
            document.getElementById('win-val').innerText = `$${(currentMoney * 0.5).toLocaleString()}`;
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
