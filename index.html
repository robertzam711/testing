<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humble Design | 50/50 Raffle</title>
    <style>
        body {
            margin: 0;
            background: #020617;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #38bdf8;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        .status-header {
            color: #38bdf8;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        #timer {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 20px;
            display: block;
        }
        .lunch-box {
            background: #38bdf8;
            color: #020617;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            margin-bottom: 25px;
        }
        .money-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        .money-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
        }
        .label { font-size: 0.8rem; opacity: 0.7; margin-bottom: 5px; }
        .amount { font-size: 1.5rem; font-weight: bold; }
        .green { color: #4ade80; }

        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-doc { background: #ffffff; color: #000000; }
        .btn-email { background: #38bdf8; color: #ffffff; }
        .btn:hover { opacity: 0.8; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-header" id="status-label">Countdown</div>
        <div id="timer">00:00:00:00</div>

        <div class="lunch-box">
            🎟️ Tickets sold at lunch, 1 dollar per entry
        </div>

        <div class="money-grid">
            <div class="money-card">
                <div class="label">Total Current Pot</div>
                <div class="amount" id="total-pot">$0</div>
            </div>
            <div class="money-card">
                <div class="label">Student Win (50%)</div>
                <div class="amount green" id="win-share">$0</div>
            </div>
        </div>
