<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humble Design Raffle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #020617;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .status {
            color: #38bdf8;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 14px;
            margin-bottom: 10px;
        }
        #timer {
            font-size: 45px;
            font-weight: 900;
            margin-bottom: 20px;
            color: #f8fafc;
        }
        .note {
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            padding: 15px;
            border-radius: 15px;
            font-weight: 700;
            margin-bottom: 25px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .label { font-size: 11px; opacity: 0.5; text-transform: uppercase; margin-bottom: 5px; }
        .value { font-size: 24px; font-weight: 700; }
        .green { color: #4ade80; }
        
        .buttons {
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 800;
            font-size: 13px;
            transition: 0.3s;
        }
        .btn-info { background: rgba(255,255,255,0.1); color: white; }
        .btn-mail { background: white; color: black; }
        .btn:hover { transform: translateY(-3px); opacity: 0.9; }
    </style>
</head>
<body>

    <div class="card">
        <div class="status" id="status-text">Countdown</div>
        <div id="timer">00:00:00:00</div>

        <div class="note">
            🎟️ Tickets sold at lunch, 1 dollar per entry
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="label">Current Pot</div>
                <div class="value" id="pot-display">$0</div>
            </div>
