<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humble Design | Official 50/50 Raffle</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #38bdf8;
            --money: #4ade80;
            --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background: linear-gradient(45deg, #020617, #0f172a, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 3rem;
            border-radius: 40px;
            text-align: center;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            z-index: 10;
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7);
            animation: pulse-blue 2s infinite;
        }

        @keyframes pulse-blue {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(56, 189, 248, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }

        h1 { font-size: 1.2rem; font-weight: 400; opacity: 0.7; text-transform: uppercase; letter-spacing: 4px; }
        
        #timer {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 800;
            margin: 1.5rem 0;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .lunch-note {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 12px;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: 700;
            margin: 1rem 0;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 1rem; }

        .stat-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 24px;
            transition: all 0.3s ease;
        }

        .stat-card:hover { background: rgba(255,255,255,0.05); transform: translateY(-5px); }

        .stat-label { font-size: 0.7rem; opacity: 0.5; margin-bottom: 0.5rem; font-weight: 700; text-transform: uppercase; }
        .stat-value { font-size: 1.8rem; font-weight: 800; color: white; }
        .stat-value.green { color: var(--money); text-shadow: 0 0 20px rgba(74, 222, 128, 0.2); }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 2rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px;
            text-decoration: none;
            border-radius: 18px;
            font-weight: 800;
            transition: all 0.3s;
            font-size: 0.8rem;
        }

        .btn-info { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--border); }
        .btn-email { background: white; color: black; }

        .btn:hover { transform: scale(1.05); }
        .btn-email:hover { background: var(--accent); color: white; }
        .btn-info:hover { background: rgba(255,255,255,0.2); }

    </style>
</head>
<body>

    <div class="container">
        <div class="live-indicator">
            <div class="pulse" id="dot"></div>
            <span id="status-label">LIVE: RAFFLE CLOSING</span>
        </div>

        <h1>Humble Design Fundraiser</h1>
        <div id="timer">00:00:00:00</div>

        <div class="lunch-note">
            🎟️ Tickets sold at lunch, 1 dollar per entry
        </div>

        <div class="grid">
            <div class="stat-card">
                <div class="stat-label">Total Current Pot</div>
                <div class="stat-value" id="total-val">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Student Win (50%)</div>
                <div class="stat-value green" id="win-val">$0</div>
            </div>
        </div>

        <div class="btn-group">
            <a href="https://docs.google.com/document/d/1XqlcoqoYsjaa6aPUWbjkxFi6Ftx30LqmZdy8ZjfArDc/edit?usp=sharing" target="_blank" class="btn btn-info">
                📄 MORE INFORMATION
            </a>
            <a href="mailto:robertzamary@aurora-schools.org?subject=Raffle Question" class="btn btn-email">
                📩 EMAIL QUESTIONS
            </a>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const currentMoney = 85; 
        // Accurate deadline: Friday, March 20, 2026 @ 2:25 PM
        const endDate = new Date("March 20, 2026 14:25:00").getTime();

        function update() {
            const now = new Date().getTime();
            const distance = endDate - now;

            if (distance < 0) {
                document.getElementById('status-label').innerText = "EVENT CLOSED";
                document.getElementById('timer').innerText = "00:00:00:00";
                document.getElementById('dot').style.background = "#ef4444";
                return;
            }

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            const pad = (n) => n.toString().padStart(2, '0');

            document.getElementById('timer').innerText = `${pad(d)}:${pad(h)}:${pad(m)}:${pad(s)}`;
            
            // MATH ENGINE
            document.getElementById('total-val').innerText = `$${currentMoney.toLocaleString()}`;
            document.getElementById('win-val').innerText = `$${(currentMoney * 0.5).toLocaleString()}`;
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
